<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍽️ 每日伙食費記事本 👶</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #2ecc71; --baby: #ff9f43; --danger: #ff7675; --warning: #f1c40f; --blue: #3498db; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; max-width: 800px; margin: 20px auto; padding: 15px; background: #f1f2f6; color: #2f3542; }
        h1, h3 { text-align: center; color: #2f3542; }
        .card { background: white; padding: 20px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .tabs { display: flex; gap: 10px; margin-bottom: 15px; justify-content: center; }
        .tab-btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; background: #ddd; transition: 0.3s; }
        .tab-btn.active { background: var(--primary); color: white; }
        .tab-btn.baby-active { background: var(--baby); color: white; }
        .input-form { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; align-items: end; }
        label { font-size: 13px; font-weight: bold; color: #57606f; display: block; margin-bottom: 5px; }
        input, select, button { padding: 12px; font-size: 15px; border: 1px solid #ced6e0; border-radius: 8px; width: 100%; box-sizing: border-box; }
        button { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; }
        button:hover { opacity: 0.9; }
        .baby-theme button { background: var(--baby); }
        .summary-box { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
        .summary-card { background: #f8f9fa; padding: 15px; border-radius: 10px; text-align: center; border-left: 5px solid var(--primary); }
        .date-header { display: flex; justify-content: space-between; align-items: center; background: #dfe4ea; padding: 12px; font-weight: bold; border-radius: 8px; margin-top: 15px; }
        .trend-arrow { font-size: 18px; font-weight: bold; }
        .arrow-up { color: var(--danger); }
        .arrow-down { color: var(--primary); }
        .arrow-flat { color: #747d8c; }
        ul { list-style: none; padding: 0; margin: 0; }
        li { padding: 12px 10px; border-bottom: 1px solid #f1f2f6; display: flex; justify-content: space-between; align-items: center; }
        .tag { padding: 2px 6px; font-size: 11px; border-radius: 4px; color: white; font-weight: bold; margin-right: 5px; }
        .tag-veg { background: var(--primary); }
        .tag-baby { background: var(--baby); }
        .del-btn { background: var(--danger); padding: 4px 8px; font-size: 12px; border-radius: 5px; width: auto; }
        .chart-container { position: relative; height: 250px; width: 100%; }
        
        /* 預算與庫存樣式 */
        .budget-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-weight: bold; }
        .progress-container { background: #eee; border-radius: 10px; height: 24px; width: 100%; overflow: hidden; position: relative; box-shadow: inset 0 2px 5px rgba(0,0,0,0.1); }
        .progress-bar { background: var(--primary); height: 100%; width: 0%; transition: width 0.5s ease; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 13px; }
        .progress-bar.warning { background: var(--warning); color: #2f3542; }
        .progress-bar.danger { background: var(--danger); }
        .inventory-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 12px; margin-top: 10px; }
        .inv-item-card { border: 1px solid #dfe4ea; padding: 12px; border-radius: 10px; background: #fcfcfc; position: relative; }
        .inv-item-card.low-stock { border-color: var(--warning); background: #fffdf0; }
        .inv-btn { width: auto; padding: 4px 10px; font-size: 14px; margin-left: 5px; display: inline-block; }
        .inv-badge { position: absolute; top: 12px; right: 12px; padding: 3px 8px; font-size: 12px; border-radius: 20px; font-weight: bold; color: white; }
        .correct-box { display: flex; gap: 5px; margin-top: 10px; background: #f1f2f6; padding: 8px; border-radius: 6px; align-items: center; }
        .correct-box input { padding: 4px 8px; font-size: 13px; width: 60px; }
        .correct-box button { padding: 4px 10px; font-size: 13px; width: auto; }
        .radio-group { display: flex; gap: 10px; background: #f1f2f6; padding: 8px 12px; border-radius: 8px; border: 1px solid #ced6e0; height: 46px; align-items: center; box-sizing: border-box; }
        .radio-group label { display: flex; align-items: center; gap: 4px; margin: 0; font-size: 14px; font-weight: normal; cursor: pointer; color: #2f3542; }
        .radio-group input { width: auto; margin: 0; cursor: pointer; }

        /* 📅 主婦專用月曆樣式 */
        .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; }
        .calendar-day-name { font-weight: bold; background: #dfe4ea; padding: 5px; border-radius: 5px; font-size: 13px; }
        .calendar-cell { background: #fafafa; border: 1px solid #eee; border-radius: 8px; min-height: 75px; padding: 4px; display: flex; flex-direction: column; align-items: stretch; justify-content: flex-start; position: relative; }
        .calendar-cell.today { background: #fffae6; border: 2px solid var(--warning); }
        .calendar-cell .day-num { font-weight: bold; font-size: 12px; color: #747d8c; text-align: left; margin-bottom: 3px; }
        .calendar-event { font-size: 10px; padding: 2px 4px; border-radius: 4px; color: white; margin-bottom: 2px; text-align: left; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: bold; }
        .event-in { background: var(--primary); }
        .event-out { background: var(--danger); }
    </style>
</head>
<body>

    <h1>🍽️ 每日伙食費記事本</h1>

    <div class="card">
        <div class="budget-header">
            <span>📅 本月伙食費預算進度條</span>
            <span>
                預算上限：$<input type="number" id="budget-limit" value="8000" style="width: 80px; padding: 4px; display: inline; font-size: 14px;" onchange="updateBudgetBar()">
            </span>
        </div>
        <div class="progress-container">
            <div id="budget-progress-bar" class="progress-bar">0%</div>
        </div>
        <p id="budget-status-text" style="text-align: center; margin-top: 8px; font-size: 14px; font-weight: bold; color: #57606f;"></p>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('veg')">🥬 蔬菜/日常食材</button>
        <button class="tab-btn" id="baby-tab" onclick="switchTab('baby')">👶 寶寶副食品專區</button>
    </div>

    <div class="card">
        <div id="form-veg" class="input-form">
            <div><label>日期</label><input type="date" id="v-date"></div>
            <div><label>食材項目</label><input type="text" id="v-item" placeholder="如：高麗菜、雞蛋"></div>
            <div><label>單價</label><input type="text" id="v-price" placeholder="數字即可"></div>
            <div><label>數量 / 份數</label><input type="number" id="v-qty" value="1" min="1"></div>
            <div><button onclick="addExpense('veg')">新增食材支出</button></div>
        </div>

        <div id="form-baby" class="input-form baby-theme" style="display: none;">
            <div><label>進貨日期</label><input type="date" id="b-date"></div>
            <div><label>廠商名稱</label><input type="text" id="b-brand" placeholder="瀚克寶寶"></div>
            <div><label>品項 / 口味</label><input type="text" id="b-item" placeholder="鮭魚粥"></div>
            <div><label>進貨數量 (盒/包)</label><input type="number" id="b-qty" value="14" min="1"></div>
            <div><label>單價</label><input type="text" id="b-price" placeholder="數字即可"></div>
            <div>
                <label>保存與消耗類型</label>
                <div class="radio-group">
                    <label><input type="radio" name="b-storage" value="冷凍" checked> ❄️ 冷凍</label>
                    <label><input type="radio" name="b-storage" value="常溫"> 👜 常溫</label>
                </div>
            </div>
            <div style="grid-column: span 1;"><button onclick="addExpense('baby')">確認加入並登記庫存</button></div>
        </div>
    </div>

    <div class="card" style="border-top: 4px solid var(--baby);">
        <h3>📦 寶寶副食品庫存與補貨備忘錄</h3>
        <div id="inventory-list" class="inventory-grid"></div>
    </div>

    <div class="card" style="border-top: 4px solid var(--blue);">
        <div class="calendar-header">
            <button onclick="changeMonth(-1)" style="width:auto; padding:5px 15px; background:var(--blue);">&lt; 上個月</button>
            <h3 id="calendar-title" style="margin:0;">2026 年 06 月</h3>
            <button onclick="changeMonth(1)" style="width:auto; padding:5px 15px; background:var(--blue);">下個月 &gt;</button>
        </div>
        <div class="calendar-grid" id="calendar-body"></div>
    </div>

    <div class="card">
        <h3>🥬 本週 vs 上週 伙食費波動分析</h3>
        <div class="summary-box">
            <div class="summary-card" style="border-left-color: var(--primary);">
                <div>本週食材總支出</div>
                <h2 id="veg-this-week">$0</h2>
            </div>
            <div class="summary-card" style="border-left-color: #747d8c;">
                <div>上週食材總支出</div>
                <h2 id="veg-last-week">$0</h2>
            </div>
        </div>
        <p id="veg-analysis-text" style="text-align: center; font-weight: bold; margin-top: 10px; color: #57606f;"></p>
    </div>

    <div class="card">
        <h3>📅 全年度每月開銷統計趨勢 (包含副食品)</h3>
        <div class="chart-container">
            <canvas id="yearlyChart"></canvas>
        </div>
    </div>

    <div class="card">
        <h3>📋 伙食費支出明細 (含每日升降趨勢)</h3>
        <div id="list-container"></div>
    </div>

    <script>
        document.getElementById('v-date').valueAsDate = new Date();
        document.getElementById('b-date').valueAsDate = new Date();
        
        let expenses = JSON.parse(localStorage.getItem('smart_home_expenses')) || [];
        let inventory = JSON.parse(localStorage.getItem('smart_home_inventory')) || [];
        let yearlyChart = null;
        let currentCalDate = new Date();

        if(!localStorage.getItem('budget_limit')) {
            localStorage.setItem('budget_limit', '8000');
        }
        document.getElementById('budget-limit').value = localStorage.getItem('budget_limit');

        function switchTab(type) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active', 'baby-active'));
            if(type === 'veg') {
                document.getElementById('form-veg').style.display = 'grid';
                document.getElementById('form-baby').style.display = 'none';
                event.target.classList.add('active');
            } else {
                document.getElementById('form-veg').style.display = 'none';
                document.getElementById('form-baby').style.display = 'grid';
                document.getElementById('baby-tab').classList.add('baby-active');
            }
        }

        function getWeekNumber(d) {
            d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
            d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay()||7));
            var yearStart = new Date(Date.UTC(d.getUTCFullYear(),0,1));
            return Math.ceil(( ( (d - yearStart) / 86400000) + 1)/7);
        }

        function cleanPriceInput(val) {
            let cleanVal = val.replace(/[^\d.]/g, ''); 
            return Number(cleanVal) || 0;
        }

        function addExpense(type) {
            let data = {};
            if (type === 'veg') {
                const date = document.getElementById('v-date').value;
                const item = document.getElementById('v-item').value;
                const rawPrice = document.getElementById('v-price').value;
                const price = cleanPriceInput(rawPrice);
                const qty = Number(document.getElementById('v-qty').value);

                if (!date || !item || price <= 0) return alert('請填寫完整正確的食材資訊與金額！');
                data = { date, type: '食材', name: item, price, qty, total: price * qty };
                
                document.getElementById('v-item').value = '';
                document.getElementById('v-price').value = '';
                document.getElementById('v-qty').value = '1';
                expenses.push(data);
            } else {
                const date = document.getElementById('b-date').value;
                const brand = document.getElementById('b-brand').value || '未知品牌';
                const item = document.getElementById('b-item').value || '未命名品項';
                const qty = Number(document.getElementById('b-qty').value);
                const rawPrice = document.getElementById('b-price').value;
                const price = cleanPriceInput(rawPrice);
                const storage = document.querySelector('input[name="b-storage"]:checked').value;

                if (!date || price <= 0 || qty <= 0) return alert('請確認有填寫進貨日期與正確的單價喔！');
                
                const fullName = `[${brand}] ${item}`;
                data = { date, type: '寶寶副食品', name: fullName, price, qty, total: price * qty };

                // 初始推算補貨日
                const calcDeadline = new Date(date);
                calcDeadline.setDate(calcDeadline.getDate() + qty);
                const deadlineStr = calcDeadline.toISOString().split('T')[0];

                inventory.push({ 
                    name: fullName, 
                    storage,
                    startDate: date, 
                    qty, 
                    manualOffset: 0,
                    deadline: deadlineStr 
                });
                
                document.getElementById('b-brand').value = '';
                document.getElementById('b-item').value = '';
                document.getElementById('b-price').value = '';
                document.getElementById('b-qty').value = '14';

                expenses.push(data);
                localStorage.setItem('smart_home_inventory', JSON.stringify(inventory));
            }

            localStorage.setItem('smart_home_expenses', JSON.stringify(expenses));
            mainRender();
        }

        // 當使用者按 +1 或 -1 時，最晚補貨日同步跟著漂移
        function changeQty(index, amount) {
            inventory[index].manualOffset += amount;
            recalculateItemDeadline(index);
            localStorage.setItem('smart_home_inventory', JSON.stringify(inventory));
            mainRender();
        }

        // 当使用者一键強制修正實際數量時，最晚補貨日從今天起算同步跟著大幅漂移！
        function forceCorrectQty(index) {
            const inputEl = document.getElementById(`correct-input-${index}`);
            const targetQty = Number(inputEl.value);
            if(isNaN(targetQty) || targetQty < 0) return alert('請輸入正確的庫存數字喔！');

            let baseQty = inventory[index].qty;
            if (inventory[index].storage === '冷凍') {
                const today = new Date();
                today.setHours(0,0,0,0);
                const start = new Date(inventory[index].startDate);
                start.setHours(0,0,0,0);
                const diffDays = Math.floor((today - start) / (1000 * 60 * 60 * 24));
                baseQty = inventory[index].qty - Math.max(0, diffDays);
            }

            inventory[index].manualOffset = targetQty - baseQty;
            recalculateItemDeadline(index); // 🌟 核心：立刻重新精算月曆日期
            
            localStorage.setItem('smart_home_inventory', JSON.stringify(inventory));
            mainRender();
            alert('庫存與月曆補貨日同步校正成功！');
        }

        // 🌟 自動根據當前實際剩餘量計算「新的補貨日期」的強大函數
        function recalculateItemDeadline(index) {
            const item = inventory[index];
            const today = new Date();
            today.setHours(0,0,0,0);

            let currentQty = item.qty + item.manualOffset;
            if (item.storage === '冷凍') {
                const start = new Date(item.startDate);
                start.setHours(0,0,0,0);
                const diffDays = Math.floor(Math.max(0, today - start) / (1000 * 60 * 60 * 24));
                currentQty = Math.max(0, item.qty - diffDays + item.manualOffset);
            }

            // 補貨日漂移邏輯：從「今天」開始往後延加目前剩餘的盒數
            const newDeadline = new Date(today);
            newDeadline.setDate(newDeadline.getDate() + currentQty);
            item.deadline = newDeadline.toISOString().split('T')[0];
        }

        function deleteInventory(index) {
            inventory.splice(index, 1);
            localStorage.setItem('smart_home_inventory', JSON.stringify(inventory));
            mainRender();
        }

        function renderInventory() {
            const container = document.getElementById('inventory-list');
            container.innerHTML = '';

            if(inventory.length === 0) {
                container.innerHTML = '<p style="text-align:center;color:#999;grid-column:1/-1;">目前冰箱還沒有登記副食品庫存喔！有購買副食品時，在上方專區填寫即可自動加入此處。</p>';
                return;
            }

            const today = new Date();
            today.setHours(0,0,0,0);

            inventory.forEach((item, index) => {
                let currentQty = item.qty + item.manualOffset;

                if (item.storage === '冷凍') {
                    const start = new Date(item.startDate);
                    start.setHours(0,0,0,0);
                    const diffDays = Math.floor(Math.max(0, today - start) / (1000 * 60 * 60 * 24));
                    currentQty = Math.max(0, item.qty - diffDays + item.manualOffset);
                } else {
                    currentQty = Math.max(0, item.qty + item.manualOffset);
                }

                const isLow = currentQty <= 2;
                const card = document.createElement('div');
                card.className = `inv-item-card ${isLow ? 'low-stock' : ''}`;
                
                let badgeHtml = '';
                if(currentQty === 0) {
                    badgeHtml = `<span class="inv-badge" style="background:var(--danger)">已斷糧 ⚠️</span>`;
                } else if(isLow) {
                    badgeHtml = `<span class="inv-badge" style="background:var(--warning); color:#2f3542;">快補貨 ⚡</span>`;
                } else {
                    badgeHtml = `<span class="inv-badge" style="background:${item.storage === '冷凍' ? 'var(--blue)' : 'var(--primary)'}">${item.storage}充裕</span>`;
                }

                card.innerHTML = `
                    <h4>${item.storage === '冷凍' ? '❄️' : '👜'} ${item.name}</h4>
                    ${badgeHtml}
                    <p style="font-size:13px; margin: 5px 0; color:#57606f;">
                        進貨日期：${item.startDate}<br>
                        進貨總數：${item.qty} 盒/包<br>
                        <strong>最晚補貨：<span style="color:var(--danger)">${item.deadline}</span></strong>
                    </p>
                    <div style="margin-top:10px; display:flex; align-items:center; justify-content:space-between;">
                        <div>
                            <span style="font-size:15px; font-weight:bold; color:#2f3542;">目前剩餘：${currentQty} 盒</span>
                        </div>
                        <div>
                            <button class="inv-btn" style="background:#dfe4ea; color:#2f3542;" onclick="changeQty(${index}, -1)">-1</button>
                            <button class="inv-btn" style="background:var(--baby);" onclick="changeQty(${index}, 1)">+1</button>
                            <button class="inv-btn" style="background:var(--danger);" onclick="deleteInventory(${index})">刪</button>
                        </div>
                    </div>
                    <div class="correct-box">
                        <span style="font-size:12px; color:#57606f;">📢 實際對庫存剩：</span>
                        <input type="number" id="correct-input-${index}" value="${currentQty}" min="0">
                        <button style="background:var(--blue);" onclick="forceCorrectQty(${index})">修改</button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function renderCalendar() {
            const body = document.getElementById('calendar-body');
            body.innerHTML = '';

            const year = currentCalDate.getFullYear();
            const month = currentCalDate.getMonth();

            document.getElementById('calendar-title').innerText = `${year} 年 ${String(month + 1).padStart(2, '0')} 月`;

            const weekDays = ['日', '一', '二', '三', '四', '五', '六'];
            weekDays.forEach(d => {
                const el = document.createElement('div');
                el.className = 'calendar-day-name';
                el.innerText = d;
                body.appendChild(el);
            });

            const firstDayIndex = new Date(year, month, 1).getDay();
            const totalDays = new Date(year, month + 1, 0).getDate();

            for (let i = 0; i < firstDayIndex; i++) {
                const blank = document.createElement('div');
                blank.className = 'calendar-cell';
                blank.style.background = '#f1f2f6';
                body.appendChild(blank);
            }

            const todayStr = new Date().toISOString().split('T')[0];

            for (let day = 1; day <= totalDays; day++) {
                const cell = document.createElement('div');
                cell.className = 'calendar-cell';

                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                if(dateStr === todayStr) cell.classList.add('today');

                cell.innerHTML = `<div class="day-num">${day}</div>`;

                inventory.forEach(item => {
                    if(item.startDate === dateStr) {
                        const ev = document.createElement('div');
                        ev.className = 'calendar-event event-in';
                        ev.innerText = `🟢 進貨:${item.name.split('] ')[1] || item.name}`;
                        cell.appendChild(ev);
                    }
                    if(item.deadline === dateStr) {
                        const ev = document.createElement('div');
                        ev.className = 'calendar-event event-out';
                        ev.innerText = `🚨 補貨:${item.name.split('] ')[1] || item.name}`;
                        cell.appendChild(ev);
                    }
                });

                body.appendChild(cell);
            }
        }

        function changeMonth(dir) {
            currentCalDate.setMonth(currentCalDate.getMonth() + dir);
            renderCalendar();
        }

        function deleteExpense(index) {
            expenses.splice(index, 1);
            localStorage.setItem('smart_home_expenses', JSON.stringify(expenses));
            mainRender();
        }

        function updateBudgetBar() {
            const limit = Number(document.getElementById('budget-limit').value) || 8000;
            localStorage.setItem('budget_limit', limit.toString());

            const currentMonth = new Date().getMonth();
            const currentYear = new Date().getFullYear();
            
            let monthTotal = 0;
            expenses.forEach(item => {
                const itemDate = new Date(item.date);
                if(itemDate.getMonth() === currentMonth && itemDate.getFullYear() === currentYear) {
                    monthTotal += item.total;
                }
            });

            const percent = Math.min(100, Math.round((monthTotal / limit) * 100)) || 0;
            const bar = document.getElementById('budget-progress-bar');
            bar.style.width = percent + '%';
            bar.innerText = `${percent}% ($${monthTotal} / $${limit})`;

            bar.className = 'progress-bar';
            const statusEl = document.getElementById('budget-status-text');
            if(percent >= 90) {
                bar.classList.add('danger');
                statusEl.innerHTML = `🚨 警告：本月預算快見底了！只剩 <span style="color:var(--danger)">$${limit - monthTotal}</span> 可以花！`;
            } else if(percent >= 70) {
                bar.classList.add('warning');
                statusEl.innerHTML = `⚠️ 提醒：開銷已達 70%，去超市拿零食請手下留情！`;
            } else {
                statusEl.innerHTML = `🥳 乾淨度良好！本月還剩 $${limit - monthTotal} 的伙食預算。`;
            }
        }

        function mainRender() {
            renderListAndTrends();
            calculateVegAnalysis();
            updateYearlyChart();
            updateBudgetBar();
            renderInventory();
            renderCalendar();
        }

        function renderListAndTrends() {
            const container = document.getElementById('list-container');
            container.innerHTML = '';

            if (expenses.length === 0) {
                container.innerHTML = '<p style="text-align:center;color:#999;">目前沒有紀錄喔！</p>';
                return;
            }

            expenses.sort((a,b) => new Date(b.date) - new Date(a.date));
            const dateGroups = {};
            expenses.forEach((item, index) => {
                if(!dateGroups[item.date]) dateGroups[item.date] = { items: [], total: 0 };
                dateGroups[item.date].items.push({...item, originalIndex: index});
                dateGroups[item.date].total += item.total;
            });

            const sortedDates = Object.keys(dateGroups).sort((a,b) => new Date(a) - new Date(b));
            const dayTrends = {};
            
            sortedDates.forEach((date, idx) => {
                if (idx === 0) {
                    dayTrends[date] = { arrow: '➔', class: 'arrow-flat', text: '首日紀錄' };
                } else {
                    const prevDate = sortedDates[idx - 1];
                    const currentTotal = dateGroups[date].total;
                    const prevTotal = dateGroups[prevDate].total;
                    if (currentTotal > prevTotal) {
                        dayTrends[date] = { arrow: '▲', class: 'arrow-up', text: `比前一日多 $${currentTotal - prevTotal}` };
                    } else if (currentTotal < prevTotal) {
                        dayTrends[date] = { arrow: '▼', class: 'arrow-down', text: `比前一日省 $${prevTotal - currentTotal}` };
                    } else {
                        dayTrends[date] = { arrow: '➔', class: 'arrow-flat', text: '金額持平' };
                    }
                }
            });

            const displayDates = Object.keys(dateGroups).sort((a,b) => new Date(b) - new Date(a));
            displayDates.forEach(date => {
                const group = dateGroups[date];
                const trend = dayTrends[date];

                const section = document.createElement('div');
                section.style.marginBottom = '15px';

                section.innerHTML = `
                    <div class="date-header">
                        <span>📅 ${date}</span>
                        <span title="${trend.text}">
                            當日總計: $${group.total} 
                            <span class="trend-arrow ${trend.class}">${trend.arrow}</span>
                        </span>
                    </div>
                `;

                const ul = document.createElement('ul');
                group.items.forEach(item => {
                    let tagClass = item.type === '食材' ? 'tag-veg' : 'tag-baby';

                    const li = document.createElement('li');
                    li.innerHTML = `
                        <div>
                            <span class="tag ${tagClass}">${item.type}</span>
                            <span>${item.name}</span>
                            <small style="color:#747d8c;">($${item.price} x ${item.qty})</small>
                        </div>
                        <div>
                            <strong style="margin-right:15px;">$${item.total}</strong>
                            <button class="del-btn" onclick="deleteExpense(${item.originalIndex})">刪除</button>
                        </div>
                    `;
                    ul.appendChild(li);
                });

                section.appendChild(ul);
                container.appendChild(section);
            });
        }

        function calculateVegAnalysis() {
            const now = new Date();
            const currentWeek = getWeekNumber(now);
            const currentYear = now.getFullYear();

            let thisWeekTotal = 0;
            let lastWeekTotal = 0;

            expenses.forEach(item => {
                if (item.type === '食材') {
                    const itemDate = new Date(item.date);
                    const itemWeek = getWeekNumber(itemDate);
                    const itemYear = itemDate.getFullYear();

                    if (itemYear === currentYear) {
                        if (itemWeek === currentWeek) thisWeekTotal += item.total;
                        else if (itemWeek === currentWeek - 1) lastWeekTotal += item.total;
                    }
                }
            });

            document.getElementById('veg-this-week').innerText = `$${thisWeekTotal}`;
            document.getElementById('veg-last-week').innerText = `$${lastWeekTotal}`;

            const textEl = document.getElementById('veg-analysis-text');
            if (thisWeekTotal > lastWeekTotal && lastWeekTotal > 0) {
                textEl.innerHTML = `⚠️ 注意！這週開銷比上週<span style="color:var(--danger)">貴了 $${thisWeekTotal - lastWeekTotal}</span>`;
            } else if (thisWeekTotal < lastWeekTotal && thisWeekTotal > 0) {
                textEl.innerHTML = `🎉 太棒了！這週開銷比上週<span style="color:var(--primary)">省了 $${lastWeekTotal - thisWeekTotal}</span>`;
            } else {
                textEl.innerText = "📈 數據累積中，下週就能為您交叉比對開銷漲跌囉！";
            }
        }

        function updateYearlyChart() {
            const monthlyTotals = Array(12).fill(0);
            expenses.forEach(item => {
                const m = new Date(item.date).getMonth();
                monthlyTotals[m] += item.total;
            });

            const ctx = document.getElementById('yearlyChart').getContext('2d');
            if (yearlyChart) {
                yearlyChart.data.datasets[0].data = monthlyTotals;
                yearlyChart.update();
            } else {
                yearlyChart = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: ['1月', '2月', '3月', '4月', '5月', '6月', '7月', '8月', '9月', '10月', '11月', '12月'],
                        datasets: [{
                            label: '當月總花費 (元)',
                            data: monthlyTotals,
                            backgroundColor: '#2ecc71',
                            borderRadius: 6
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        scales: { y: { beginAtZero: true } }
                    }
                });
            }
        }

        mainRender();
    </script>
</body>
</html>
